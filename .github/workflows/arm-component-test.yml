name: ARM Component Tests
on:
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 0 * * *"  # Run every day at midnight
  workflow_dispatch:  # Run on manual trigger
    inputs:
      run-arm:
        description: 'Run App Resource Manager component tests'
        required: true
        type: boolean
        default: false
      emf-branch:
        description: 'The branch, tag or SHA to checkout EMF'
        required: true
        type: string
        default: main
permissions:
  contents: read

jobs:
  check-virtualization:
    runs-on: ubuntu-latest
    steps:
      - name: Check virtualization support
        run: |
          echo "=== CPU Info ==="
          grep -E "(vmx|svm)" /proc/cpuinfo || echo "No virtualization flags found"
          
          echo "=== KVM Support ==="
          ls -la /dev/kvm 2>/dev/null || echo "/dev/kvm not available"
          
          echo "=== KVM Modules ==="
          lsmod | grep kvm || echo "No KVM modules loaded"
          
          echo "=== Nested Virtualization Check ==="
          cat /sys/module/kvm_*/parameters/nested 2>/dev/null || echo "Cannot check nested virtualization"
          
          echo "=== Hardware Acceleration Test ==="
          which kvm-ok && kvm-ok || echo "kvm-ok not available"
          
          echo "=== System Info ==="
          uname -a
          cat /proc/version
  component-test-arm:
    if: ${{ inputs.run-arm || github.event_name == 'schedule' || github.event.label.name == 'run-arm-component-tests' }}
    name: ARM Component Test
    uses: ./.github/workflows/common-comp-tests.yml
    with:
      component: app-resource-manager
      use-ven: true
      emf-branch: ${{ inputs.emf-branch || 'main' }}
    secrets: inherit  # zizmor: ignore[secrets-inherit]
