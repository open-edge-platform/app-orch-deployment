name: Post-Merge App Resource Manager

on:
  push:
    branches:
      - main
      - release-*
    paths:
      - 'app-resource-manager/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-merge-pipeline:
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge.yml@d032a6f118957b4470e8e8aef22399fb59f412de  # 2026.0.19
    with:
      run_version_check: true
      run_dep_version_check: false
      run_build: true
      run_docker_build: true
      run_docker_push: true
      run_helm_build: true
      run_helm_push: true
      run_version_tag: true
      prefix_tag_separator: "/"
      project_folder: "app-resource-manager"
      trivy_image_skip: |
        ghcr.io/dependabot/dependabot-updater-core:latest,
        ghcr.io/github/github-mcp-server:latest,
        ghcr.io/github/gh-aw-mcpg:latest,
        ghcr.io/github/gh-aw-firewall/agent:latest,
        ghcr.io/github/gh-aw-firewall/api-proxy:latest,
        ghcr.io/github/gh-aw-firewall/squid:latest
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
      NO_AUTH_ECR_PUSH_USERNAME: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
      NO_AUTH_ECR_PUSH_PASSWD: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}
      MSTEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
