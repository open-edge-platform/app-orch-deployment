---
# Traefik IngressRoute for App Resource Manager (ARM) API routing.
# Routes new-style multi-tenant paths directly to the ARM REST proxy,
# bypassing the nexus-api-gateway.
#
# New-style paths routed here (project name extracted by service middleware):
#   /v1/projects/{projectName}/resources/...  -> ARM REST proxy
#
# Legacy paths (resource.orchestrator.apis/v2/...) continue to be routed
# via the nexus-api-gateway for backward compatibility.
{{- if .Values.ingressRoute.enabled }}
apiVersion: {{ .Values.traefikApiGroup | default "traefik.io/v1alpha1" }}
kind: IngressRoute
metadata:
  name: {{ include "app-resource-manager.fullname" . }}-http
  namespace: {{ .Values.traefikReverseProxy.gatewayNamespace | default "orch-gateway" }}
spec:
  entryPoints:
    - websecure
  routes:
    # Route for new-style multi-tenant resource API paths.
    # ActiveProjectID is extracted from the URL path by the service middleware.
    - match: Host(`{{ required "A valid apiHostname entry required!" .Values.ingressRoute.apiHostname }}`) && PathRegexp(`^/v1/projects/[^/]+/resources(/.*)?$`)
      kind: Rule
      priority: 50
      middlewares:
        - name: validate-jwt
          namespace: orch-gateway
        - name: secure-headers
          namespace: orch-gateway
      services:
        - name: {{ include "app-resource-manager.fullname" . }}-rest-proxy
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.service.restProxy.port }}
          scheme: http
  tls:
    options:
      name: {{ required "A valid tlsOptionName entry required!" .Values.ingressRoute.tlsOptionName }}
      namespace: orch-gateway
    secretName: {{ required "A valid orchSecretName entry required!" .Values.ingressRoute.orchSecretName }}
{{- end }}
